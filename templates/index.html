<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Tea Vending ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <style>

    .logo {
      display: block;
      margin: 0 auto 15px;
      width: 120px;
      height: auto;
    }
    .error-msg {
    color: red;
    margin-top: 11px;
    font-size: 16px;
    display: none;
    text-transform: capitalize;
    }
  </style>
</head>
<body>
  <section class="login-sec">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card login-card">
            <div class="card-header text-center">
              <!-- Logo -->
              <img src="/static/images/logo.png" alt="Tea Vending ERP" class="logo">
              <!-- <h3 class="mb-0">
                <i class="fas fa-coffee me-2"></i>
                Tea Vending ERP
              </h3> -->
              <p class="mb-0 mt-2">Please sign in to continue</p>
            </div>
            <div class="card-body p-4">
              <form onsubmit="login(event)">
                <div class="mb-3">
                  <label for="email" class="form-label">
                    <i class="fas fa-envelope me-1"></i>Email Address
                  </label>
                  <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>
                <div class="mb-4">
                  <label for="password" class="form-label">
                    <i class="fas fa-lock me-1"></i>Password
                  </label>
                  <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>
                <div class="d-grid">
                  <button type="submit" class="btn btn-success btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                  </button>
                </div>
                <!-- Error message -->
                <div id="errorMsg" class="error-msg"></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    async function login(event) {
      event.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorDiv = document.getElementById("errorMsg");

      const button = event.target.querySelector('button[type="submit"]');
      const originalText = button.innerHTML;
      button.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';
      button.disabled = true;

      errorDiv.style.display = 'none';
      errorDiv.textContent = '';

      try {
        const res = await fetch("/users/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("access_token", data.access_token);
          window.location.href = "/dashboard";
        } else {
          errorDiv.style.display = 'block';
          errorDiv.textContent = data.detail || "Invalid email or password.";
        }
      } catch (error) {
        errorDiv.style.display = 'block';
        errorDiv.textContent = "Network error. Please try again.";
      } finally {
        button.innerHTML = originalText;
        button.disabled = false;
      }
    }
  </script>
</body>
</html>
