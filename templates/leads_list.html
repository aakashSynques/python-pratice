{% extends "base.html" %}
{% block title %}Leads - Tea Vending ERP{% endblock %}
{% block page_title %}Lead Management{% endblock %}
{% block content %}
<div class="card-header">
    <div class="row">
        <div class="col-md-6">
            <h5 class="mb-0">Leads Management</h5>
        </div>
        <div class="col-md-6 text-end">
            <!-- <a href="/leads/add" class="btn bg-color btn-sm btn-success">
                <i class="fas fa-plus me-1"></i>
                Add New Lead
            </a> -->
            <button class="btn bg-color btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#addLeadModal">
                <i class="fas fa-plus me-1"></i>
                Add New Lead
            </button>
        </div>
    </div>
</div>
<div class="card-body" style="    padding: 8px 0 0;">
    <div class="table-responsive">
        <table class="table table-hover table-bordered  align-middle" id="leadsTable" style="width:100%">
            <thead class="table-secondary">
                <tr>
                    <th>SNo</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Item</th>
                    <th>Source</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th width="120">Actions</th>
                </tr>
            </thead>
            <tbody id="leadsTableBody">
            </tbody>
        </table>
    </div>
</div>


<!-- // ================= Add Lead  ================= // -->
<div class="modal fade" id="addLeadModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Lead</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">

                <form id="addLeadForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Name *</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone *</label>
                            <input type="tel" class="form-control" id="phone" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="address" class="form-label">Address *</label>
                            <input type="text" class="form-control" id="address" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="item_name" class="form-label">Item Name *</label>
                            <input type="text" class="form-control" id="item_name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="source" class="form-label">Source *</label>
                            <select class="form-control" id="source" required>
                                <option value="">Select Source</option>
                                <option value="website">Website</option>
                                <option value="referral">Referral</option>
                                <option value="social_media">Social Media</option>
                                <option value="advertisement">Advertisement</option>
                                <option value="cold_call">Cold Call</option>
                                <option value="trade_show">Trade Show</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                     <div class="col-md-12 mb-3">
                            <label for="message" class="form-label">Message</label>
                            <textarea class="form-control" id="message" rows="2"></textarea>        
                        </div>
                      

                    </div>
                </form>

                <!-- Form fields will go here -->
            </div>
        </div>
    </div>



    {% endblock %}
    {% block scripts %}
    <script>
        let leadsTable;
        async function loadLeads() {
            try {
                const response = await fetch('/leads/all-leads',
                    {
                        headers: getAuthHeaders()
                    }
                );
                if (response.ok) {
                    const leadsData =
                        await response.json();
                    renderLeadsTable(leadsData);
                }
                else {
                    handleApiError({
                        status: response.status,
                        message: 'Failed to load leads'
                    });
                }
            }
            catch (error) {
                console.error('Error loading leads:', error);
                alert('Failed to load leads');
            }
        }
        // Render Table Rows
        function renderLeadsTable(data) {
            if ($.fn.DataTable.isDataTable('#leadsTable')) {
                $('#leadsTable')
                    .DataTable()
                    .destroy();
            }
            const tbody = document.getElementById('leadsTableBody');
            tbody.innerHTML = '';
            data.forEach(lead => {
                const row = `
            <tr>
                <td>${data.indexOf(lead) + 1}</td>
                <td>${lead.name}</td>
                <td>${lead.email}</td>
                <td>${lead.phone}</td>
                <td>${lead.address}</td>
                <td>${lead.item_name}</td>
                <td>${lead.source}</td>
                <td>
                    <span class="badge bg-${getStatusColor(lead.status)}">
                        ${lead.status}
                    </span>
                </td>   
                <td>${new Date(lead.created_at).toLocaleString()}</td>

                <td>
                    <div class="btn-group">
                        <button  class="btn btn-sm btn-outline-primary" onclick="editLead(${lead.id})" >
                            <i class="fas fa-edit"></i>
                        </button> 
                        <button class="btn btn-sm btn-outline-success" onclick="scheduleDemo(${lead.id})" >
                            <i class="fas fa-calendar"></i>
                        </button>
                        <button  class="btn btn-sm btn-outline-danger" onclick="deleteLead(${lead.id})" >
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </td>
            </tr>
        `;
                tbody.innerHTML += row;
            });
            initializeDataTable();
        }
        // Initialize DataTable
        function initializeDataTable() {
            leadsTable = $('#leadsTable').DataTable({
                responsive: true,
                pageLength: 10,
                lengthMenu: [10, 25, 50, 100],
                order: [[0, "desc"]],
                // Custom Layout
                dom:
                    "<'row mb-1'" +
                    "<'col-md-6 d-flex align-items-center'B>" +
                    "<'col-md-6 d-flex justify-content-end'f>" +
                    ">" +
                    "<'row'<'col-12'tr>>" +
                    "<'row mt-2'" +
                    "<'col-md-6'i>" +
                    "<'col-md-6'p>" +
                    ">",
                buttons: [
                    {
                        extend: 'copy',
                        className: 'btn btn-sm btn-secondary'
                    },
                    {
                        extend: 'csv',
                        className: 'btn btn-sm btn-secondary'
                    },
                    {
                        extend: 'excel',
                        className: 'btn btn-sm btn-secondary'
                    },

                    {
                        extend: 'pdf',
                        className: 'btn btn-sm btn-secondary'
                    },

                    {
                        extend: 'print',
                        className: 'btn btn-sm btn-secondary'
                    }
                ],
                columnDefs: [
                    {
                        targets: -1,
                        orderable: false
                    }
                ]
            });
        }
        // Status Badge Color
        function getStatusColor(status) {
            switch (status) {
                case 'new':
                    return 'secondary';
                case 'demo_scheduled':
                    return 'info';
                case 'demo_completed':
                    return 'success';
                default:
                    return 'secondary';
            }
        }
        // Edit Lead
        function editLead(id) { window.location.href = `/leads/edit/${id}`; }
        // Schedule Demo
        function scheduleDemo(id) { window.location.href = `/leads/schedule?lead_id=${id}`; }
        // Delete Lead
        async function deleteLead(id) {
            if (
                confirm(
                    'Are you sure you want to delete this lead?'
                )
            ) {
                try {
                    const response =
                        await fetch(
                            `/leads/${id}`,
                            {
                                method: 'DELETE',
                                headers: getAuthHeaders()
                            }
                        );
                    if (response.ok) {
                        alert(
                            'Lead deleted successfully'
                        );
                        loadLeads();
                    }
                    else {
                        handleApiError({
                            status: response.status,
                            message: 'Failed to delete lead'
                        });
                    }
                }
                catch (error) {
                    alert(
                        'Failed to delete lead'
                    );
                }
            }
        }
        // Load when page ready
        $(document).ready(function () { loadLeads(); });
    </script>
    {% endblock %}
