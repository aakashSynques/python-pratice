{% extends "base.html" %}

{% block title %}Clients - Tea Vending ERP{% endblock %}

{% block page_title %}Client Management{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="row">
            <div class="col-md-6">
                <h5 class="mb-0">Client List</h5>
            </div>
        </div>
    </div>

    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle" id="clientsTable" style="width:100%">
                <thead class="table-secondary">
                    <tr>
                        <th>Sno</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th>Work Order</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="clientsTableBody">
                </tbody>
            </table>
        </div>



    </div>
</div>
{% endblock %}



{% block scripts %}
<script>
    let clientsData = [];

    async function loadClients() {
        try {
            const response = await fetch('/clients/', {
                headers: getAuthHeaders()
            });

            if (response.ok) {
                clientsData = await response.json();
                renderClientsTable();
            } else {
                handleApiError({ status: response.status, message: 'Failed to load clients' });
            }
        } catch (error) {
            alert('Failed to load clients');
        }
    }

    function renderClientsTable(data) {
        if ($.fn.DataTable.isDataTable('#clientsTable')) {
            $('#clientsTable')
                .DataTable()
                .destroy();
        }
        const tbody = document.getElementById('clientsTableBody');
        tbody.innerHTML = '';

        clientsData.forEach(client => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${clientsData.indexOf(client) + 1}</td>
                <td>${client.name}</td>
                <td>${client.email}</td>
                <td>${client.mobile}</td>
 
                <td>${client.address || '-'}</td>
                <th>
                    <button 
                        class="btn btn-sm btn-info " 
                    >
                      Create Order
                    </button>
                    
                    </th>
                                <td>${new Date(client.created_at).toLocaleString()}</td>

                <td>
                    <div class="btn-group" role="group">
                  
                        <button class="btn btn-sm btn-outline-info" onclick="viewDetails(${client.id})">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });
        initializeDataTable();
    }

    function editClient(id) {
        // For now, just alert. In a real app, you'd navigate to edit page
        alert(`Edit client ${id} - Feature coming soon`);
    }

    function viewDetails(id) {
        // For now, just alert. In a real app, you'd show a modal or navigate to detail page
        alert(`View details for client ${id} - Feature coming soon`);
    }

    // Load clients when page loads
    window.onload = function () {
        loadClients();
    };

    // Initialize DataTable
    function initializeDataTable() {
        $('#clientsTable').DataTable({
            responsive: true,
            pageLength: 10,
            lengthMenu: [10, 25, 50, 100],
            order: [[0, "asc"]],
            dom:
                "<'row mb-1'" +
                "<'col-md-6 d-flex align-items-center'B>" +
                "<'col-md-6 d-flex justify-content-end'f>" +
                ">" +
                "<'row'<'col-12'tr>>" +
                "<'row mt-2'" +
                "<'col-md-6'i>" +
                "<'col-md-6'p>" +
                ">",
            buttons: [
                {
                    extend: 'copy',
                    className: 'btn btn-sm btn-secondary'
                },
                {
                    extend: 'csv',
                    className: 'btn btn-sm btn-secondary'
                },
                {
                    extend: 'excel',
                    className: 'btn btn-sm btn-secondary'
                },
                {
                    extend: 'pdf',
                    className: 'btn btn-sm btn-secondary'
                },
                {
                    extend: 'print',
                    className: 'btn btn-sm btn-secondary'
                }
            ],
            columnDefs: [
                {
                    targets: -1,
                    orderable: false
                }
            ]
        });
    }
    // Page Load
    $(document).ready(function () {
        loadClients();
    });

</script>
{% endblock %}
