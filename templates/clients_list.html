{% extends "base.html" %}

{% block title %}Clients - Tea Vending ERP{% endblock %}

{% block page_title %}Client Management{% endblock %}

{% block content %}
<div class="row mb-3">
    <div class="col-md-6">
        <h4>All Clients</h4>
    </div>
    <div class="col-md-6 text-end">
        <a href="/clients/add" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i>Add New Client
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover" id="clientsTable">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Company</th>
                        <th>Address</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="clientsTableBody">
                    <!-- Data will be loaded via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let clientsData = [];

    async function loadClients() {
        try {
            const response = await fetch('/clients/', {
                headers: getAuthHeaders()
            });

            if (response.ok) {
                clientsData = await response.json();
                renderClientsTable();
            } else {
                handleApiError({ status: response.status, message: 'Failed to load clients' });
            }
        } catch (error) {
            console.error('Error loading clients:', error);
            alert('Failed to load clients');
        }
    }

    function renderClientsTable() {
        const tbody = document.getElementById('clientsTableBody');
        tbody.innerHTML = '';

        clientsData.forEach(client => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${client.id}</td>
                <td>${client.name}</td>
                <td>${client.email}</td>
                <td>${client.phone}</td>
                <td>${client.company_name || '-'}</td>
                <td>${client.address || '-'}</td>
                <td>
                    <div class="btn-group" role="group">
                        <button class="btn btn-sm btn-outline-primary" onclick="editClient(${client.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-info" onclick="viewDetails(${client.id})">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function editClient(id) {
        // For now, just alert. In a real app, you'd navigate to edit page
        alert(`Edit client ${id} - Feature coming soon`);
    }

    function viewDetails(id) {
        // For now, just alert. In a real app, you'd show a modal or navigate to detail page
        alert(`View details for client ${id} - Feature coming soon`);
    }

    // Load clients when page loads
    window.onload = function() {
        loadClients();
    };
</script>
{% endblock %}
